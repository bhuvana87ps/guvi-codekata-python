<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Python Playground</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">
<span class="navbar-brand">
Python Logic Playground
</span>
</div>
</nav>

<div class="container-fluid">

<div class="row">

<div class="col-md-3 sidebar p-3">

<h5>Problems</h5>

<input
type="text"
id="searchBox"
class="form-control mb-3"
placeholder="Search problems..."
onkeyup="searchProblems()">

<div id="problemList"></div>

</div>

<div class="col-md-9 p-4">

<div class="card mb-3">

<div class="card-body">

<h5 id="problemTitle">Select a Problem</h5>

<p id="problemDesc"></p>

</div>

</div>

<textarea id="editor">

print("Hello Python Playground")

</textarea>

<button class="btn btn-success mt-3"
onclick="runCode()">

Run Code

</button>

<h5 class="mt-4">Output</h5>

<div id="output"></div>

</div>

</div>

</div>

<div class="mt-3">
  <label class="form-label">Input</label>
  <textarea id="userInput" class="form-control" rows="3"
  placeholder="Enter input values here"></textarea>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

<script src="script.js"></script>

</body>

</html>
