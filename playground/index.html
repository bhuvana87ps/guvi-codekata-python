<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Python Code Practice Playground</title>
<meta name="google-site-verification" content="google4dc3db8664cf5531.html">
<meta name="description" content="Practice Python coding problems directly in your browser with real-time execution.">

<meta name="keywords" content="Python practice, coding playground, codekata, python problems">

<meta name="author" content="Bhuvana87ps"><head>


<meta property="og:title" content="Python Practice Platform">
<meta property="og:description" content="Solve Python coding problems online">
<meta property="og:type" content="website">
<meta property="og:image" content="preview.png">


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

<link rel="stylesheet" href="style.css">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-84C3H0JKHQ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-84C3H0JKHQ');
</script>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">

<span class="navbar-brand">
Python Logic Playground
</span>

<div>

<button class="btn btn-warning btn-sm me-2"
onclick="toggleTheme()">
🌙 Toggle Theme
</button>

<span id="timer" class="text-white fw-bold">
00:00
</span>

</div>

</div>
</nav>



<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->

<div class="col-md-3 sidebar p-3">

<h5>Progress</h5>

<div class="progress mb-2">
<div id="progressBar" class="progress-bar bg-success"></div>
</div>

<p id="progressText">Solved 0 / 0</p>



<h5 class="mt-4">Problems</h5>

<input
type="text"
id="searchBox"
class="form-control mb-2"
placeholder="Search problems..."
onkeyup="searchProblems()">


<select
id="difficultyFilter"
class="form-select mb-3"
onchange="filterProblems()">

<option value="">All Difficulty</option>
<option value="Easy">Easy</option>
<option value="Medium">Medium</option>
<option value="Hard">Hard</option>

</select>


<div id="problemList"></div>

</div>



<!-- MAIN CODING AREA -->

<div class="col-md-9 p-4">

<!-- PROBLEM DESCRIPTION -->

<div class="card mb-3">

<div class="card-body">

<h5 id="problemTitle">Select a Problem</h5>

<p id="problemDesc">
Choose a problem from the sidebar to start coding.
</p>

</div>

</div>



<!-- CODE EDITOR -->

<textarea id="editor">
print("Hello Python Playground")
</textarea>



<!-- ACTION BUTTONS -->

<div class="mt-3">

<button class="btn btn-success"
onclick="runCode()">
Run Code
</button>

<button class="btn btn-secondary ms-2"
onclick="clearOutput()">
Clear Output
</button>

</div>



<!-- INPUT -->

<div class="mt-4">

<label class="form-label fw-bold">
Input
</label>

<textarea
id="userInput"
class="form-control"
rows="3"
placeholder="Example input:
4
5"></textarea>

</div>



<!-- OUTPUT -->

<h5 class="mt-4">Output</h5>

<div id="output"></div>



<!-- SUBMISSION HISTORY -->

<h5 class="mt-4">Submission History</h5>

<ul id="historyList" class="list-group"></ul>



<!-- LEADERBOARD -->

<h5 class="mt-4">Leaderboard</h5>

<table class="table table-bordered">

<thead>

<tr>
<th>User</th>
<th>Solved</th>
</tr>

</thead>

<tbody>

<tr>
<td>Bhuvana</td>
<td id="leaderSolved">0</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>



<!-- LIBRARIES -->

<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

<script src="script.js"></script>

</body>
</html>
