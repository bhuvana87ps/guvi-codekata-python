<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Python Logic Playground</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">
<span class="navbar-brand">Python Logic Playground</span>
</div>
</nav>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-3 sidebar p-3">

<h5>Progress</h5>

<div class="progress mb-2">
<div id="progressBar" class="progress-bar bg-success"></div>
</div>

<p id="progressText"></p>

<h5 class="mt-3">Problems</h5>

<input
type="text"
id="searchBox"
class="form-control mb-2"
placeholder="Search problems..."
onkeyup="searchProblems()">

<select id="difficultyFilter"
class="form-select mb-3"
onchange="filterProblems()">

<option value="">All Difficulty</option>
<option value="Easy">Easy</option>
<option value="Medium">Medium</option>
<option value="Hard">Hard</option>

</select>

<div id="problemList"></div>

</div>


<!-- MAIN AREA -->

<div class="col-md-9 p-4">

<div class="card mb-3">
<div class="card-body">
<h5 id="problemTitle">Select a Problem</h5>
<p id="problemDesc"></p>
</div>
</div>

<textarea id="editor">
print("Hello Python Playground")
</textarea>

<div class="mt-3">

<button class="btn btn-success" onclick="runCode()">Run Code</button>

<button class="btn btn-secondary ms-2" onclick="clearOutput()">Clear Output</button>

</div>

<div class="mt-4">

<label class="form-label"><b>Input</b></label>

<textarea
id="userInput"
class="form-control"
rows="3"
placeholder="Example:
4
5"></textarea>

</div>

<h5 class="mt-4">Output</h5>

<div id="output"></div>

</div>

</div>
</div>


<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

<script src="script.js"></script>

</body>
</html>
